services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kyc
      POSTGRES_PASSWORD: kyc
      POSTGRES_DB: kyc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyc -d kyc"]
      interval: 2s
      timeout: 3s
      retries: 15

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://kyc:kyc@postgres:5432/kyc
      PERSISTENCE_BACKEND: postgres
    # Optional overrides (real model providers, LangSmith keys, thresholds).
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
